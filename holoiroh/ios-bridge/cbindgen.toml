# cbindgen config for generating include/HoloirohIosBridge.h from this crate's
# `extern "C"` surface. Run:
#
#   cbindgen --config cbindgen.toml --crate holoiroh-ios-bridge \
#     --output include/HoloirohIosBridge.h
#
# The header is the primary Swift-visible surface (there is no uniffi codegen
# on the iroh-live side -- see ../ios/IROH_FFI.md), so it is committed, not a
# build-time throwaway. Regenerate it whenever the `extern "C"` signatures in
# src/lib.rs change.

language = "C"
pragma_once = true
include_guard = "HOLOIROH_IOS_BRIDGE_H"
autogen_warning = "/* Generated by cbindgen from holoiroh/ios-bridge/src/lib.rs -- do not edit by hand; regenerate with `cbindgen --config cbindgen.toml --crate holoiroh-ios-bridge --output include/HoloirohIosBridge.h`. */"
cpp_compat = true
documentation = true
documentation_style = "doxy"
style = "type"

[export]
# Emit the status/pixel-format constants and the opaque/frame types.
include = [
  "HoloirohBridge",
  "HoloirohSubscription",
  "HoloirohFrame",
  "HoloirohStatus",
]

[parse]
parse_deps = false
